<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntropyFront - Circular References</title>
    <link rel="stylesheet" href="examples.css">
</head>
<body>
    <div class="container">
        <h1>Circular references</h1>
        <p class="note">Open file:// after <code>pnpm run build</code>. Test Serialization needs a static server (pnpm exec serve .).</p>
        <div class="section">
            
            <button onclick="createCircularReference()">Create Circular Reference</button>
            <button onclick="createComplexObject()">Create Complex Object</button>
            <button onclick="testSerialization()">Test Serialization</button>
            <button onclick="simulateError()" class="danger">Simulate Error with Circular Reference</button>
            <button onclick="clearOutput()">Clear</button>
        </div>
        <div class="section">
            <h3>Output</h3>
            <div id="output" class="output">—</div>
        </div>
    </div>

    <script src="../dist/index.min.js"></script>
    <script>
        (function () {
            var syntropyFront = window.SyntropyFront;
            if (!syntropyFront) {
                document.getElementById('output').textContent = 'Build missing. From repo root run: pnpm run build';
                return;
            }
            try {
                syntropyFront.configure({ endpoint: 'https://httpbin.org/post', usePersistentBuffer: true });
                log('✅ SyntropyFront configured (circular reference handling)', 'success');
            } catch (e) {
                log('❌ Error configuring: ' + e.message, 'error');
            }
            var circularObject = null;
            var complexObject = null;
            function log(message, type) {
                type = type || 'info';
                var output = document.getElementById('output');
                var prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
                output.textContent += '[' + new Date().toLocaleTimeString() + '] ' + prefix + ' ' + message + '\n';
                output.scrollTop = output.scrollHeight;
            }
            window.clearOutput = function () {
                document.getElementById('output').textContent = 'Output cleared...\n';
            };
            window.createCircularReference = function () {
                try {
                    log('Creating circular reference...', 'info');
                    var parent = { name: 'Parent Object', type: 'parent', timestamp: new Date(), metadata: { created: Date.now(), version: '1.0.0' } };
                    var child = { name: 'Child Object', type: 'child', parent: parent, siblings: [] };
                    var sibling = { name: 'Sibling Object', type: 'sibling', parent: parent, brother: null };
                    parent.child = child;
                    parent.children = [child, sibling];
                    child.siblings.push(sibling);
                    sibling.brother = child;
                    parent.self = parent;
                    child.self = child;
                    circularObject = { parent: parent, child: child, sibling: sibling };
                    log('✅ Circular reference created successfully', 'success');
                } catch (e) {
                    log('❌ Error: ' + e.message, 'error');
                }
            };
            window.createComplexObject = function () {
                try {
                    log('Creating complex object...', 'info');
                    complexObject = {
                        string: 'Example text',
                        number: 42,
                        boolean: true,
                        null: null,
                        date: new Date(),
                        regex: /test/g,
                        error: new Error('Example error'),
                        array: [1, 2, 3, 'text', { nested: true }],
                        object: { nested: true, deep: { deeper: { deepest: 'deep value' } } },
                        circular: null
                    };
                    complexObject.circular = complexObject;
                    log('✅ Complex object created successfully', 'success');
                } catch (e) {
                    log('❌ Error: ' + e.message, 'error');
                }
            };
            window.testSerialization = function () {
                log('Testing serialization...', 'info');
                if (!circularObject && !complexObject) {
                    log('⚠️ First create objects with the buttons above', 'warning');
                    return;
                }
                log('⚠️ Robust serialization test requires a static server. Run: pnpm exec serve . from repo root, then open /examples/circular-references.html', 'warning');
            };
            window.simulateError = function () {
                try {
                    log('Simulating error with circular reference...', 'info');
                    if (!circularObject && !complexObject) {
                        log('⚠️ First create objects with the buttons above', 'warning');
                        return;
                    }
                    var errorContext = {
                        circularData: circularObject || complexObject,
                        userInfo: { name: 'Test User', preferences: { theme: 'dark', language: 'en' } },
                        appState: { currentPage: '/test', navigation: { history: [], current: null } }
                    };
                    errorContext.appState.navigation.current = errorContext.appState;
                    var testError = new Error('Test error with circular references');
                    syntropyFront.sendError(testError, errorContext);
                    log('✅ Error sent to SyntropyFront with circular context', 'success');
                } catch (e) {
                    log('❌ Error: ' + e.message, 'error');
                }
            };
            log('Use the buttons to test different scenarios', 'info');
        })();
    </script>
</body>
</html>
