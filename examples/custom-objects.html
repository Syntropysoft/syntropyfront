<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntropyFront - Custom objects</title>
    <link rel="stylesheet" href="examples.css">
</head>
<body>
    <h1>SyntropyFront – Custom objects & breadcrumbs</h1>
    <p class="note">Run <code>pnpm run build</code> then open via file://. State changes are logged as breadcrumbs.</p>

    <div class="container">
        <h2>Actions</h2>
        <button onclick="simulateRedux()">Update Redux</button>
        <button onclick="simulateProfile()">Update Profile</button>
        <button onclick="simulateAppState()">Update App State</button>
        <button onclick="triggerError()">Trigger Error</button>
    </div>

    <div class="container">
        <h2>Current state</h2>
        <div class="grid">
            <div><h3>Redux</h3><pre id="redux-display">{}</pre></div>
            <div><h3>Profile</h3><pre id="user-display">-</pre></div>
        </div>
        <h3>App state</h3>
        <pre id="app-display">{}</pre>
    </div>

    <div class="container">
        <h2>Breadcrumb history</h2>
        <button onclick="showHistory()">Show history</button>
        <pre id="history-display">—</pre>
    </div>

    <script src="../dist/index.min.js"></script>
    <script>
        (function () {
            var sf = window.SyntropyFront;
            if (!sf) { document.body.insertAdjacentHTML('afterbegin', '<p class="error">Build missing. Run: pnpm run build</p>'); return; }
            sf.configure({ endpoint: 'https://httpbin.org/post' });

            window.reduxStore = { state: { user: null, posts: [], loading: false }, version: '1.0' };
            window.appState = { page: 'home', theme: 'light' };

            function updateDisplays() {
                document.getElementById('redux-display').textContent = JSON.stringify(window.reduxStore, null, 2);
                document.getElementById('app-display').textContent = JSON.stringify(window.appState, null, 2);
                var p = localStorage.getItem('userProfile');
                document.getElementById('user-display').textContent = p || '—';
            }

            window.simulateRedux = function () {
                var actions = ['USER_LOGIN', 'POSTS_LOADED', 'SET_LOADING'];
                var type = actions[Math.floor(Math.random() * actions.length)];
                if (type === 'USER_LOGIN') window.reduxStore.state.user = { name: 'User', role: 'admin' };
                else if (type === 'POSTS_LOADED') window.reduxStore.state.posts = [{ id: 1, title: 'Post 1' }];
                else window.reduxStore.state.loading = true;
                sf.addBreadcrumb('state', 'Redux: ' + type, window.reduxStore.state);
                updateDisplays();
            };

            window.simulateProfile = function () {
                var profile = { name: 'User', email: 'u@ex.com', theme: 'dark' };
                localStorage.setItem('userProfile', JSON.stringify(profile));
                sf.addBreadcrumb('user', 'Profile updated', profile);
                updateDisplays();
            };

            window.simulateAppState = function () {
                window.appState = { page: ['home','profile','settings'][Math.floor(Math.random()*3)], theme: 'dark' };
                sf.addBreadcrumb('state', 'App state', window.appState);
                updateDisplays();
            };

            window.triggerError = function () {
                try { throw new Error('Test error'); } catch (e) { sf.sendError(e, { redux: window.reduxStore.state, appState: window.appState }); }
            };

            window.showHistory = function () {
                document.getElementById('history-display').textContent = JSON.stringify(sf.getBreadcrumbs(), null, 2);
            };

            updateDisplays();
        })();
    </script>
</body>
</html>
