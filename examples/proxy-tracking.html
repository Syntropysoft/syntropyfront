<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntropyFront - Breadcrumbs & context</title>
    <link rel="stylesheet" href="examples.css">
</head>
<body>
    <div class="container">
        <h1>Breadcrumbs &amp; context</h1>
        <p class="note">Open file:// after <code>pnpm run build</code>. Proxy not in build; uses breadcrumbs + sendError.</p>
        <div class="section">
            
            <button onclick="createUserProfile()">Create User Profile</button>
            <button onclick="createShoppingCart()">Create Shopping Cart</button>
            <button onclick="modifyObjects()" class="success">Modify Objects</button>
            <button onclick="showHistory()" class="info">Show History</button>
            <button onclick="simulateError()" class="danger">Simulate Error</button>
            <button onclick="clearOutput()">Clear Output</button>
        </div>

        <div class="section">
            <h3>Statistics</h3>
            <div id="stats" class="stats">
                <div class="stat"><span class="stat-value" id="trackedObjects">0</span><br><span class="stat-label">Tracked</span></div>
                <div class="stat"><span class="stat-value" id="totalStates">0</span><br><span class="stat-label">Breadcrumbs</span></div>
                <div class="stat"><span class="stat-value" id="changes">0</span><br><span class="stat-label">Changes</span></div>
            </div>
        </div>
        <div class="section">
            <h3>Output</h3>
            <div id="output" class="output">—</div>
        </div>
    </div>

    <script src="../dist/index.min.js"></script>
    <script>
        (function () {
            var syntropyFront = window.SyntropyFront;
            if (!syntropyFront) {
                document.getElementById('output').textContent = 'Build missing. From repo root run: pnpm run build';
                return;
            }
            syntropyFront.configure({ endpoint: 'https://httpbin.org/post', usePersistentBuffer: true });
            var userProfile = null;
            var shoppingCart = null;
            var changeCount = 0;
            function log(message, type) {
                type = type || 'info';
                var output = document.getElementById('output');
                var prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
                output.textContent += '[' + new Date().toLocaleTimeString() + '] ' + prefix + ' ' + message + '\n';
                output.scrollTop = output.scrollHeight;
                changeCount++;
            }
            window.clearOutput = function () {
                document.getElementById('output').textContent = 'Output cleared...\n';
                changeCount = 0;
                updateStats();
            };
            function updateStats() {
                var stats = syntropyFront.getStats();
                document.getElementById('trackedObjects').textContent = userProfile || shoppingCart ? '2' : '0';
                document.getElementById('totalStates').textContent = stats.breadcrumbs || 0;
                document.getElementById('changes').textContent = changeCount;
            }
            window.createUserProfile = function () {
                log('Creating user profile (breadcrumb)...', 'info');
                userProfile = { id: 1, name: 'John Doe', email: 'john@test.com', preferences: { theme: 'light', language: 'en' }, isActive: true };
                syntropyFront.addBreadcrumb('user', 'User profile created', userProfile);
                log('✅ User profile created', 'success');
                updateStats();
            };
            window.createShoppingCart = function () {
                log('Creating shopping cart (breadcrumb)...', 'info');
                shoppingCart = { id: 'cart_123', items: [{ id: 1, name: 'Product 1', price: 100, quantity: 2 }], total: 200, currency: 'USD' };
                syntropyFront.addBreadcrumb('user', 'Shopping cart created', shoppingCart);
                log('✅ Shopping cart created', 'success');
                updateStats();
            };
            window.modifyObjects = function () {
                log('Modifying objects...', 'info');
                if (userProfile) {
                    userProfile.name = 'John Carlos Doe';
                    userProfile.preferences.theme = 'dark';
                    syntropyFront.addBreadcrumb('user', 'Profile updated', { name: userProfile.name });
                    log('✅ User profile modified', 'success');
                }
                if (shoppingCart) {
                    shoppingCart.items.push({ id: 2, name: 'Product 2', price: 50, quantity: 1 });
                    syntropyFront.addBreadcrumb('user', 'Cart updated', { items: shoppingCart.items.length });
                    log('✅ Shopping cart modified', 'success');
                }
                if (!userProfile && !shoppingCart) log('⚠️ First create profile or cart', 'warning');
                updateStats();
            };
            window.showHistory = function () {
                log('Breadcrumb history:', 'info');
                var breadcrumbs = syntropyFront.getBreadcrumbs();
                breadcrumbs.forEach(function (b, i) {
                    log('  ' + (i + 1) + ': ' + b.category + ' - ' + b.message, 'info');
                });
                if (breadcrumbs.length === 0) log('No breadcrumbs yet', 'warning');
            };
            window.simulateError = function () {
                var ctx = { userProfile: userProfile, shoppingCart: shoppingCart, demo: 'proxy-tracking' };
                syntropyFront.sendError(new Error('Test error with context'), ctx);
                log('✅ Error sent with context', 'success');
            };
            log('SyntropyFront ready. Use the buttons to test.', 'success');
            updateStats();
        })();
    </script>
</body>
</html>
